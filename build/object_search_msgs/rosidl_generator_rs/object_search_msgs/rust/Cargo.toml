[package]
name = "object_search_msgs"
version = "0.0.0"
edition = "2021"

[dependencies]
rosidl_runtime_rs = "0.6"
serde = { version = "1", optional = true, features = ["derive"] }
serde-big-array = { version = "0.5.1", optional = true }

# ROS Dependencies
nav_msgs = "*"
action_msgs = "*"
tf2_msgs = "*"
builtin_interfaces = "*"
std_msgs = "*"
service_msgs = "*"
geometry_msgs = "*"
sensor_msgs = "*"

[features]
serde = ['dep:serde', 'dep:serde-big-array', 'rosidl_runtime_rs/serde', 'nav_msgs/serde', 'action_msgs/serde', 'tf2_msgs/serde', 'builtin_interfaces/serde', 'std_msgs/serde', 'service_msgs/serde', 'geometry_msgs/serde', 'sensor_msgs/serde']

[package.metadata.rclrs]
reexport = true
