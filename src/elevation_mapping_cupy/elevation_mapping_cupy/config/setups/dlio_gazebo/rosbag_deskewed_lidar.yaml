/elevation_mapping_node:
  ros__parameters:
    # Rosbag/real-robot standard input: a motion-corrected cloud expressed in
    # the LiDAR frame, plus DLIO TF odom -> base_link -> LiDAR.
    map_frame: "odom"
    base_frame: "base_link"
    corrected_map_frame: "odom"

    subscribers:
      deskewed_lidar:
        topic_name: "/points_deskewed_lidar"
        data_type: "pointcloud"
        qos_reliability: "reliable"
        qos_depth: 10

    publishers:
      elevation_map_raw:
        layers: ["elevation", "variance", "traversability"]
        basic_layers: ["elevation"]
        fps: 5.0
      elevation_map_filter:
        layers: ["min_filter", "smooth", "near_base_filtered", "despiked", "inpaint", "elevation", "traversability"]
        basic_layers: ["min_filter", "smooth", "near_base_filtered", "despiked", "inpaint"]
        fps: 3.0
